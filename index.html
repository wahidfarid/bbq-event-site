<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBQ Event</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha255-coSDSvUR5NtHlvVpA4MnN+xcVFUmnPpyAAAA=+68Y=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-blue-50 text-gray-900 font-sans">

    <!-- Password Overlay -->
    <div id="password-overlay" class="fixed inset-0 z-[9999] flex items-center justify-center bg-blue-600 px-6">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-2xl font-bold text-blue-800 mb-4">Enter the Secret Code</h2>
            <input type="password" id="password-input" class="w-full px-4 py-2 border-2 border-blue-200 rounded-lg mb-4 focus:outline-none focus:border-yellow-400 text-center text-xl" placeholder="••••••">
            <button id="submit-password" class="w-full bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-bold py-2 px-4 rounded-lg transition">Unlock</button>
            <p id="error-msg" class="text-red-500 text-sm mt-2 hidden">Wrong password!</p>
        </div>
    </div>

    <!-- Main Application Content -->
    <div id="app-content" class="hidden">
        <header id="hero" class="bg-blue-500 text-white py-20 px-6 text-center">
            <h1 id="event-title" class="text-5xl font-bold mb-4">Loading...</h1>
            <p id="event-date" class="text-2xl font-medium">Loading...</p>
        </header>

        <main class="max-w-5xl mx-auto px-6 py-12">
            
            <!-- Expectations Section -->
            <section id="expectations-section" class="mb-16">
                <h2 class="text-3xl font-bold mb-6 text-blue-700">What to Expect</h2>
                <div id="expectations-list" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Content injected by script.js -->
                </div>
            </section>

            <!-- Map Section -->
            <section id="map-section" class="mb-16">
                <h2 class="text-3xl font-bold mb-6 text-blue-700">Where are we going?</h2>
                <div id="map" class="w-full h-96 rounded-xl shadow-inner border-4 border-white"></div>
            </section>

            <!-- Location Showcase Section -->
            <section id="locations-section" class="mb-16">
                <h2 class="text-3xl font-bold mb-6 text-blue-700">Location Options</h2>
                <div id="locations-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Location cards injected here -->
                </div>
            </section>

            <!-- Poll Section -->
            <section id="poll-section" class="mb-16 text-center">
                <h2 class="text-3xl font-bold mb-6 text-blue-700">Vote for your favorite!</h2>
                <div id="poll-container" class="bg-yellow-50 rounded-2xl border-2 border-yellow-200 overflow-hidden">
                    <iframe data-tally-src="https://tally.so/embed/q4NVj9?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1&formEventsForwarding=1" loading="lazy" width="100%" height="369" frameborder="0" marginheight="0" marginwidth="0" title="BBQ Location"></iframe>
                </div>
            </section>

        </main>

        <footer class="bg-blue-900 text-white py-6 text-center">
            <p>&copy; 2026 BBQ Party</p>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>
</body>
</html>
